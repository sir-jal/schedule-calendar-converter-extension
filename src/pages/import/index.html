<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Import Schedule</title>
    <link rel="stylesheet" href="../../styles/shared.css" />
    <link rel="stylesheet" href="./style.css">


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.12.1/css/all.css" crossorigin="anonymous">

    <!-- <script src="../../scripts/shared.js" defer></script> -->
    <script type="module" src="./script.js" defer></script>

</head>

<body>
    <div id="yoo">
        <div class="header">
            <div class="imagecontainer">
                <a href="../home/index.html" title="return to home page">
                    <img src="../../images/import page logo.png" alt="extension logo">
                </a>
            </div>
            <h1>Schedule Importer</h1>
            <p class="subheader">
                Import a valid .ICS file. A file created using an extension version older than 2.0.0 will not be
                accepted.
            </p>
        </div>

        <div class="main">

            <div class="message">
            </div>

            <div class="fileInputContainer">

                <div class="fileInputElementContainer">
                    <input type="file" name="icsfileinput" id="icsfileinput" accept=".ics">
                </div>

                <button id="importFile">Import File</button>

                <div id="fileInputMessage" class="message error">
                    The file you provided is not an .ics file.
                </div>
            </div>







        </div>
    </div>
</body>

</html>
