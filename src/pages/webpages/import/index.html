<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Import Schedule</title>
    <link rel="icon" type="image/png" href="../../../images/import page logo.png">

    <!--nav bar-->
    <link rel="stylesheet" href="../../../styles/webpage/navBar.css">
    <script src="../../../scripts/webpage/loadNav.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.12.1/css/all.css" crossorigin="anonymous">
    <link rel="stylesheet" href="../../../styles/shared.css" />
    <link rel="stylesheet" href="./style.css">

    <!-- <script src="../../scripts/shared.js" defer></script> -->
    <script type="module" src="./script.js" defer></script>

</head>

<body>
    <div id="yoo">
        <div class="navigation">
        </div>
        <div class="header" style="display: flex; flex-direction: column; align-items: center;">
            <h1>Schedule Importer</h1>
            <p class="subheader" style="width: 90%;">
                Import a valid .ICS or .JSON file. You may also drag a file. If you drag multiple files, only the first
                one will be read. A file created using an extension version older than 2.0.0 will not be accepted.
            </p>
        </div>

        <div class="main">

            <div class="message">
            </div>

            <div class="fileInputContainer">

                <div class="fileInputElementContainer">
                    <input type="file" name="icsfileinput" id="icsfileinput" accept=".ics,.json">
                </div>

                <button id="importFile">Import File</button>

                <div id="fileInputMessage" class="message error">
                    The file you provided is not an .ics file.
                </div>
            </div>







        </div>
    </div>
</body>

</html>
